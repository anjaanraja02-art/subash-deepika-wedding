<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subash ❤️ Deepika | The Royal Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #D4AF37;
  --premium-black: #0a0a0a;
  --glass: rgba(0, 0, 0, 0.6);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif; background: var(--premium-black); color:#fff; scroll-behavior:smooth; overflow-x: hidden;}

/* --- LUXURY HEADER --- */
header{
    height: 100vh;
    width: 100%;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
}

/* Photo Full Screen setting - Face cut fixed */
.main-bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('photo1.jpg') center/cover no-repeat;
    z-index: 1;
}

/* Gradient overlay for text clarity */
header::after {
    content: "";
    position: absolute;
    top:0; left:0; width: 100%; height: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
    z-index: 2;
}

/* Mobile-la unga photo position-a naane set panniyachu */
@media (max-width: 768px) {
    .main-bg {
        background-position: 78% center; /* This ensures both faces are visible on mobile */
    }
}

.hero-content{
    z-index: 10;
    padding: 40px 20px;
    max-width: 90%;
    animation: fadeIn 2s ease-in-out;
}

.trending-quote {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(26px, 6vw, 40px);
    color: var(--gold);
    margin-bottom: 10px;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

.hero-content h1{
    font-family: 'Playfair Display', serif;
    font-size: clamp(35px, 10vw, 75px);
    background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
    margin-bottom: 15px;
}

.wedding-date {
    font-size: 18px;
    letter-spacing: 4px;
    color: #fff;
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    display: inline-block;
    padding: 8px 25px;
    font-weight: 600;
}

/* --- SECTIONS --- */
section{padding:100px 20px; text-align:center;}
h2{font-family:'Playfair Display',serif; color:var(--gold); font-size:40px; letter-spacing: 2px;}
.divider{width:80px; height:2px; background:var(--gold); margin:20px auto 40px;}

.details-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 30px;
    padding: 50px 30px;
    max-width: 800px;
    margin: 0 auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* --- PAKKA GALLERY GRID --- */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    max-width: 1200px;
    margin: 0 auto;
}
.gallery img{
    width:100%; height:400px; object-fit:cover;
    border-radius:20px; cursor:pointer;
    transition: 0.6s all ease;
    border: 1px solid rgba(212, 175, 55, 0.1);
}
.gallery img:hover{ 
    transform: translateY(-10px); 
    border-color: var(--gold); 
    box-shadow: 0 15px 30px rgba(212,175,55,0.2);
}

/* FLOATING MUSIC BUTTON */
.music-btn {
    position: fixed; bottom: 30px; left: 30px; z-index: 1000;
    background: var(--gold); color: #000; 
    border: none; padding: 15px 25px; border-radius: 50px; 
    font-weight: bold; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    display: flex; align-items: center; gap: 10px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

footer{ padding:80px 20px; background: #050505; color:var(--gold); text-align: center; border-top: 1px solid #1a1a1a;}

#lightbox{
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.98); display:none; justify-content:center; align-items:center; z-index:9999;
}
#lightbox img{ max-width:95%; max-height:90%; border-radius:10px; border: 1px solid var(--gold); }
</style>
</head>

<body>

<audio id="weddingMusic" loop>
  <source src="wedding-music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">
  <span id="musicIcon">🎵</span> <span id="btnText">Play Music</span>
</button>

<header>
  <div class="main-bg"></div>
  <div class="hero-content">
    <div class="trending-quote">A Match Made in Heaven...</div>
    <h1>Subash & Deepika</h1>
    <div class="wedding-date">MARCH 16, 2026</div>
  </div>
</header>

<section>
  <div class="details-card">
    <h2>The Ceremony</h2>
    <div class="divider"></div>
    <p style="font-size: 20px; margin-bottom: 20px; color: #ccc;">We warmly invite you to share in our joy.</p>
    <p style="color: var(--gold); font-weight: 600; font-size: 26px;">Hindu Nadar Sanga Thirumana Mandapam</p>
    <p style="font-size: 18px; margin-bottom: 30px;">Sivagalai – Tuticorin District</p>
    
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15764.043685608244!2d77.965825!3d8.971236!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b03f0d0e1b6f0e3%3A0x6b0f0e3d0e1b6f0e!2sSivagalai%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1710000000000" 
    width="100%" height="350" style="border-radius:20px; border:0; filter: grayscale(1) contrast(1.2) invert(90%);" allowfullscreen="" loading="lazy"></iframe>
  </div>
</section>

<section id="gallery">
    <h2>Our Memories</h2>
    <div class="divider"></div>
    <div class="gallery">
      <img src="photo1.jpg" onclick="openLightbox(this.src)">
      <img src="photo2.jpg" onclick="openLightbox(this.src)">
      <img src="photo3.jpg" onclick="openLightbox(this.src)">
      <img src="photo4.jpg" onclick="openLightbox(this.src)">
      <img src="photo5.jpg" onclick="openLightbox(this.src)">
      <img src="photo6.jpg" onclick="openLightbox(this.src)">
      <img src="photo7.jpg" onclick="openLightbox(this.src)">
      <img src="photo8.jpg" onclick="openLightbox(this.src)">
      <img src="photo9.jpg" onclick="openLightbox(this.src)">
      <img src="photo10.jpg" onclick="openLightbox(this.src)">
    </div>
</section>

<footer>
  <p style="font-size: 16px; opacity: 0.8;">WITH DIVINE BLESSINGS</p>
  <span style="font-size: 30px; margin-top: 15px; display: block; color: var(--gold); font-family: 'Great Vibes', cursive;">Subash ❤️ Deepika</span>
  <p style="margin-top: 20px; font-size: 12px; letter-spacing: 2px;">SEE YOU AT THE WEDDING!</p>
</footer>

<div id="lightbox" onclick="this.style.display='none'">
    <img id="lightboxImg">
</div>

<script>
function openLightbox(src){ 
    document.getElementById("lightbox").style.display="flex"; 
    document.getElementById("lightboxImg").src=src; 
}

function toggleMusic() {
  var audio = document.getElementById('weddingMusic');
  var btnText = document.getElementById('btnText');
  var icon = document.getElementById('musicIcon');
  if (audio.paused) {
    audio.play();
    btnText.innerHTML = 'Stop Music';
    icon.innerHTML = '⏸';
  } else {
    audio.pause();
    btnText.innerHTML = 'Play Music';
    icon.innerHTML = '🎵';
  }
}
</script>

</body>
</html>
