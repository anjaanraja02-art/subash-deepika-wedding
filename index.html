<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subash ❤️ Deepika | Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #D4AF37;
  --royal-theme: #000b1e; /* Royal Navy Blue Theme */
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif; background: var(--royal-theme); color:#fff; scroll-behavior:smooth; overflow-x: hidden;}

/* --- HEADER SECTION: CONTENT MOVED UP --- */
header{
    height: 100vh;
    width: 100%;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-start; 
    padding-top: 5vh; /* எழுத்துக்கள் மேலே நகர்த்தப்பட்டுள்ளது */
    text-align: center;
    overflow: hidden;
}

.main-bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('photo2.jpg') center/cover no-repeat;
    z-index: 1;
}

header::after {
    content: "";
    position: absolute;
    top:0; left:0; width: 100%; height: 100%;
    background: linear-gradient(to bottom, rgba(0, 11, 30, 0.4) 0%, rgba(0, 11, 30, 0.1) 40%, rgba(0, 11, 30, 0.9) 100%);
    z-index: 2;
}

/* Mobile Face Alignment */
@media (max-width: 768px) {
    .main-bg {
        background-position: center 10%; 
    }
}

.hero-content{
    z-index: 10;
    padding: 20px;
    max-width: 90%;
    animation: fadeIn 2s ease-in-out;
}

.trending-quote {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(24px, 5vw, 38px);
    color: var(--gold);
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    margin-bottom: 5px;
}

.hero-content h1{
    font-family: 'Playfair Display', serif;
    font-size: clamp(34px, 8vw, 65px);
    background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
}

.wedding-date {
    font-size: 16px;
    color: gold;
    font-weight: bold;
    letter-spacing: 3px;
    border-top: 1px solid gold;
    border-bottom: 1px solid gold;
    display: inline-block;
    padding: 5px 15px;
    margin-top: 8px;
}

/* --- CARDS & GALLERY --- */
section{padding:80px 20px; text-align:center;}
h2{font-family:'Playfair Display',serif; color:var(--gold); font-size:36px;}
.divider{width:60px; height:2px; background:var(--gold); margin:15px auto 35px;}

.details-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 20px;
    padding: 40px 25px;
    max-width: 750px;
    margin: 0 auto;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
}
.gallery img{
    width:100%; height:350px; object-fit:cover;
    border-radius:15px; border: 1px solid rgba(212, 175, 55, 0.1);
}

/* MUSIC BUTTON */
.music-btn {
    position: fixed; bottom: 25px; left: 20px; z-index: 1000;
    background: var(--gold); color: #000b1e; 
    border: none; padding: 10px 20px; border-radius: 30px; 
    font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    display: flex; align-items: center; gap: 8px; font-size: 13px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

footer{ padding:60px; background: #000612; color:var(--gold); text-align: center;}
</style>
</head>

<body onclick="playMusicOnFirstClick()"> <audio id="weddingMusic" loop>
  <source src="wedding-music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" id="musicBtn" onclick="event.stopPropagation(); toggleMusic();">
  <span id="musicIcon">🎵</span> <span id="btnText">Play Music</span>
</button>

<header>
  <div class="main-bg"></div>
  <div class="hero-content">
    <div class="trending-quote">"Two Hearts, One Soul..."</div>
    <h1>Subash & Deepika</h1>
    <div class="wedding-date">March 16 • 2026</div>
  </div>
</header>

<section>
  <div class="details-card">
    <h2>Wedding Ceremony</h2>
    <div class="divider"></div>
    <p style="margin-bottom: 10px; opacity: 0.9;">Join us as we celebrate our new beginning.</p>
    <p style="color: var(--gold); font-weight: 600; font-size: 22px;">Hindu Nadar Sanga Thirumana Mandapam</p>
    <p>Sivagalai – Tuticorin District</p>
    <br>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15764.444256627047!2d77.9427181!3d8.9665518!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b03eb2df551403b%3A0xc6c78a05c754b7c1!2sSivagalai%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1709400000000!5m2!1sen!2sin5" width="100%" height="280" style="border-radius:15px; border:0; filter: contrast(1.1) brightness(0.9);"></iframe>
  </div>
</section>

<section id="gallery">
    <h2>Our Special Moments</h2>
    <div class="divider"></div>
    <div class="gallery">
      <img src="photo1.jpg"><img src="photo2.jpg"><img src="photo3.jpg">
      <img src="photo4.jpg"><img src="photo5.jpg"><img src="photo6.jpg">
      <img src="photo7.jpg"><img src="photo8.jpg"><img src="photo9.jpg"><img src="photo10.jpg">
    </div>
</section>

<footer>
  <p style="font-size: 14px; opacity: 0.8; letter-spacing: 2px;">WITH BEST COMPLIMENTS</p>
  <span style="font-size: 32px; color: var(--gold); font-family: 'Great Vibes', cursive;">Subash ❤️ Deepika</span>
</footer>

<script>
var audio = document.getElementById('weddingMusic');
var hasPlayed = false;

// Function for Screen Click
function playMusicOnFirstClick() {
  if (!hasPlayed) {
    audio.play().then(() => {
        document.getElementById('btnText').innerHTML = 'Stop Music';
        document.getElementById('musicIcon').innerHTML = '⏸';
        hasPlayed = true;
    }).catch(error => console.log("Autoplay blocked"));
  }
}

// Function for Button
function toggleMusic() {
  if (audio.paused) {
    audio.play();
    document.getElementById('btnText').innerHTML = 'Stop Music';
    document.getElementById('musicIcon').innerHTML = '⏸';
  } else {
    audio.pause();
    document.getElementById('btnText').innerHTML = 'Play Music';
    document.getElementById('musicIcon').innerHTML = '🎵';
  }
  hasPlayed = true; // Prevents the screen click from restarting music
}
</script>

</body>
</html>
