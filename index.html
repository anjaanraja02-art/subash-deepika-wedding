<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subash ❤️ Deepika | The Royal Union</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #D4AF37;
  --bg-color: #1a0202; 
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif; background: var(--bg-color); color:#fff; scroll-behavior:smooth; overflow-x: hidden;}

/* --- GRAND HEADER: NO FACE CUT DESIGN --- */
header{
    height: 100vh;
    width: 100%;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
}

/* மங்கலான பின்புலம் - திரையை முழுமையாக நிரப்ப */
.bg-blur {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('photo1.jpg') center/cover no-repeat;
    filter: blur(10px) brightness(0.4);
    z-index: 1;
    transform: scale(1.1);
}

/* மணமக்கள் இருவரும் முழுமையாகத் தெரிய (Main View) */
.couple-main {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('photo1.jpg') no-repeat;
    background-size: contain; 
    background-position: center bottom;
    z-index: 2;
}

.hero-content{
    z-index: 10;
    padding: 30px;
    background: rgba(0,0,0,0.5);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(212, 175, 55, 0.4);
    max-width: 85%;
    box-shadow: 0 15px 35px rgba(0,0,0,0.8);
    animation: fadeInUp 2s ease-out;
}

.trending-quote {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(22px, 5vw, 32px);
    color: var(--gold);
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.hero-content h1{
    font-family: 'Playfair Display', serif;
    font-size: clamp(35px, 9vw, 65px);
    background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* --- Content Sections --- */
section{padding:100px 20px; text-align:center;}
h2{font-family:'Playfair Display',serif; color:var(--gold); font-size:40px;}
.divider{width:60px; height:2px; background:var(--gold); margin:20px auto 40px;}

.glass-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 20px;
    padding: 40px;
    max-width: 700px;
    margin: 0 auto;
}

/* Floating Music Button */
.music-btn {
    position: fixed; bottom: 30px; left: 30px; z-index: 1000;
    background: var(--gold); color: #000; border: none; padding: 12px 22px;
    border-radius: 50px; font-weight: bold; cursor: pointer;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    display: flex; align-items: center; gap: 10px;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(50px); }
  to { opacity: 1; transform: translateY(0); }
}

footer{ padding:50px; background: #110101; color:var(--gold); text-align: center;}
</style>
</head>

<body>

<audio id="weddingMusic" loop>
  <source src="wedding-music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">
  <span id="musicIcon">🎵</span> <span id="btnText">Play Music</span>
</button>

<header>
  <div class="bg-blur"></div> <div class="couple-main"></div> <div class="hero-content">
    <div class="trending-quote">"Two Hearts, One Soul... A Journey of Love Begins!"</div>
    <h1>Subash & Deepika</h1>
    <p style="font-size: 18px; letter-spacing: 3px; color: gold; margin-top: 10px; font-weight: bold; border-top: 1px solid gold; border-bottom: 1px solid gold; display: inline-block; padding: 5px 15px;">MARCH 16 • 2026</p>
  </div>
</header>

<section>
  <div class="glass-card">
    <h2>The Wedding</h2>
    <div class="divider"></div>
    <p style="font-size: 18px; margin-bottom: 20px;">We request the honor of your presence at the marriage of our children.</p>
    <p style="color: var(--gold); font-weight: 600; font-size: 22px;">Hindu Nadar Sanga Thirumana Mandapam</p>
    <p>Sivagalai – Tuticorin District</p>
    <br>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3946.046468724732!2d77.9424754!3d8.6481716!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b03f09623e59b93%3A0x6e788c6978184f9b!2sHindu%20Nadar%20Mahimai%20Sangam!5e0!3m2!1sen!2sin!4v1710000000000" 
    width="100%" height="300" style="border-radius:15px; border:0; opacity: 0.8;" allowfullscreen="" loading="lazy"></iframe>
  </div>
</section>

<footer>
  WITH DIVINE BLESSINGS 🙏<br>
  <span style="font-size: 20px; margin-top: 10px; display: block; color: var(--gold);">SUBASH ❤️ DEEPIKA</span>
</footer>

<script>
function toggleMusic() {
  var audio = document.getElementById('weddingMusic');
  var btnText = document.getElementById('btnText');
  var icon = document.getElementById('musicIcon');
  if (audio.paused) {
    audio.play();
    btnText.innerHTML = 'Stop Music';
    icon.innerHTML = '⏸';
  } else {
    audio.pause();
    btnText.innerHTML = 'Play Music';
    icon.innerHTML = '🎵';
  }
}
</script>

</body>
</html>
