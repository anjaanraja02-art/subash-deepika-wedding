<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subash ❤️ Deepika | Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --gold: #D4AF37; --bg: #1a0202; } /* Royal Maroon & Gold Theme */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif; background: var(--bg); color:#fff; scroll-behavior:smooth; overflow-x: hidden;}

/* --- HEADER: FACE CUT FIXED --- */
header{
    height: 100vh; width: 100%; position: relative;
    display: flex; justify-content: center; align-items: flex-start; 
    padding-top: 8vh; text-align: center; /* பெயர்கள் இன்னும் மேலே நகர்த்தப்பட்டுள்ளது */
}
.main-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: url('photo2.jpg') center/cover no-repeat; z-index: 1;
}
header::after {
    content: ""; position: absolute; top:0; left:0; width: 100%; height: 100%;
    background: linear-gradient(to bottom, rgba(26,2,2,0.5) 0%, rgba(26,2,2,0.2) 40%, rgba(26,2,2,0.95) 100%);
    z-index: 2;
}
@media (max-width: 768px) { .main-bg { background-position: center 15%; } }

.hero-content{ z-index: 10; animation: fadeIn 2s ease-in-out; }
.hero-content h1{ font-family: 'Playfair Display', serif; font-size: clamp(34px, 10vw, 65px); color: var(--gold); font-weight: 700; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
.wedding-date { font-size: 16px; color: gold; letter-spacing: 3px; border-top: 1px solid gold; border-bottom: 1px solid gold; display: inline-block; padding: 5px 15px; margin-top: 10px; font-weight: bold; }

/* --- LUXURY CARDS --- */
section{padding:60px 20px; text-align:center;}
.luxury-card {
    background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
    border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 25px;
    padding: 40px 20px; max-width: 750px; margin: 0 auto; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

/* WISHES DISPLAY AREA (REAL-TIME) */
.wishes-container { margin-top: 30px; text-align: left; max-height: 400px; overflow-y: auto; padding: 10px; }
.wish-bubble { background: rgba(212, 175, 55, 0.1); padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--gold); position: relative; animation: slideUp 0.5s ease-out; }
.wish-bubble strong { color: var(--gold); display: block; margin-bottom: 5px; font-size: 14px; }
.delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 10px; }

input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 12px; color: #fff; outline: none; }
.btn-gold { width: 100%; background: linear-gradient(45deg, #BF953F, #FCF6BA); color: #000; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; font-size: 16px; transition: 0.3s; }
.btn-gold:hover { transform: scale(1.02); }

.music-btn { position: fixed; bottom: 25px; left: 20px; z-index: 1000; background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

<body onclick="playMusicOnFirstClick()">

<audio id="weddingMusic" loop><source src="wedding-music.mp3" type="audio/mpeg"></audio>
<button class="music-btn" id="musicBtn" onclick="event.stopPropagation(); toggleMusic();"><span id="musicIcon">🎵</span> <span id="btnText">Play Music</span></button>

<header>
  <div class="main-bg"></div>
  <div class="hero-content">
    <p style="font-family: 'Great Vibes', cursive; font-size: clamp(24px, 5vw, 32px); color: var(--gold);">A Match Made in Heaven...</p>
    <h1>Subash & Deepika</h1>
    <div class="wedding-date">MARCH 16 • 2026</div>
  </div>
</header>

<section>
  <div class="luxury-card">
    <h2 style="color: var(--gold); font-family: 'Playfair Display', serif; margin-bottom: 20px; font-size: 32px;">Wedding Venue</h2>
    <div style="width: 50px; height: 2px; background: var(--gold); margin: 0 auto 20px;"></div>
    <p style="font-size: 20px; font-weight: 600; color: #fff;">Hindu Nadar Sanga Thirumana Mandapam</p>
    <p style="margin-bottom: 25px; opacity: 0.9;">Sivagalai, Tuticorin District, Tamil Nadu.</p>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3945.719717551066!2d77.94273527581515!3d8.526514796365457!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b03f021e141a02b%3A0xc3c942861e687836!2sHindu%20Nadar%20Mahimai%20Sangam!5e0!3m2!1sen!2sin!4v1711200000000!5m2!1sen!2sin" width="100%" height="300" style="border-radius:15px; border:1px solid var(--gold);" allowfullscreen="" loading="lazy"></iframe>
  </div>
</section>

<section id="gallery">
    <h2 style="color: var(--gold); font-family: 'Playfair Display', serif; margin-bottom: 30px; font-size: 32px;">Captured Moments</h2>
    <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px;">
      <img src="photo1.jpg" style="width:100%; height:350px; object-fit:cover; border-radius:15px; border:1px solid rgba(212,175,55,0.3);">
      <img src="photo2.jpg" style="width:100%; height:350px; object-fit:cover; border-radius:15px; border:1px solid rgba(212,175,55,0.3);">
      <img src="photo3.jpg" style="width:100%; height:350px; object-fit:cover; border-radius:15px; border:1px solid rgba(212,175,55,0.3);">
      <img src="photo4.jpg" style="width:100%; height:350px; object-fit:cover; border-radius:15px; border:1px solid rgba(212,175,55,0.3);">
      <img src="photo5.jpg" style="width:100%; height:350px; object-fit:cover; border-radius:15px; border:1px solid rgba(212,175,55,0.3);">
      <img src="photo6.jpg" style="width:100%; height:350px; object-fit:cover; border-radius:15px; border:1px solid rgba(212,175,55,0.3);">
      <img src="photo7.jpg" style="width:100%; height:350px; object-fit:cover; border-radius:15px; border:1px solid rgba(212,175,55,0.3);">
      <img src="photo8.jpg" style="width:100%; height:350px; object-fit:cover; border-radius:15px; border:1px solid rgba(212,175,55,0.3);">
      <img src="photo9.jpg" style="width:100%; height:350px; object-fit:cover; border-radius:15px; border:1px solid rgba(212,175,55,0.3);">
      <img src="photo10.jpg" style="width:100%; height:350px; object-fit:cover; border-radius:15px; border:1px solid rgba(212,175,55,0.3);">
    </div>
</section>

<section>
  <div class="luxury-card">
    <h2 style="color: var(--gold); font-family: 'Playfair Display', serif; margin-bottom: 20px; font-size: 32px;">Bless the Couple</h2>
    <input type="text" id="nameInput" placeholder="Your Name">
    <textarea id="wishInput" placeholder="Write your warm wishes here..." rows="4"></textarea>
    <button class="btn-gold" onclick="saveWish()">Send Wishes & WhatsApp</button>
    
    <div id="wishesDisplay" class="wishes-container">
      <p style="text-align: center; opacity: 0.5;">Loading wishes...</p>
    </div>
  </div>
</section>

<footer style="padding:80px 20px; text-align:center; background:#0a0101;">
  <p style="opacity: 0.6; letter-spacing: 2px; margin-bottom: 10px;">WITH DIVINE BLESSINGS</p>
  <span style="font-size: 38px; color: var(--gold); font-family: 'Great Vibes', cursive;">Subash ❤️ Deepika</span>
</footer>

<script>
// --- FIREBASE CONFIGURATION (Verified for subashdeepikawedding-ebbd3) ---
const firebaseConfig = {
  databaseURL: "https://subashdeepikawedding-ebbd3-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// மியூசிக் கண்ட்ரோல் - ஒருமுறை தொட்டாலே ஓடும்
var audio = document.getElementById('weddingMusic'); 
var hasPlayed = false;
function playMusicOnFirstClick() { if (!hasPlayed) { audio.play(); hasPlayed = true; document.getElementById('btnText').innerText = 'Stop Music'; document.getElementById('musicIcon').innerText = '⏸'; } }
function toggleMusic() { 
  if (audio.paused) { audio.play(); document.getElementById('btnText').innerText = 'Stop Music'; document.getElementById('musicIcon').innerText = '⏸'; } 
  else { audio.pause(); document.getElementById('btnText').innerText = 'Play Music'; document.getElementById('musicIcon').innerText = '🎵'; } 
}

// வாழ்த்துக்களைச் சேமிக்க மற்றும் வாட்ஸ்அப் அனுப்ப
function saveWish() {
    const name = document.getElementById('nameInput').value;
    const wish = document.getElementById('wishInput').value;
    if (name === "" || wish === "") { alert("Please enter Name and Wish!"); return; }
    
    database.ref('wishes').push().set({ name: name, wish: wish }).then(() => {
        // WhatsApp-க்கு அனுப்புதல் (9629377101)
        window.open(`https://wa.me/919629377101?text=${encodeURIComponent("Wedding Wish from " + name + ": " + wish)}`);
        document.getElementById('nameInput').value = ""; 
        document.getElementById('wishInput').value = "";
    });
}

// வாழ்த்துக்களைக் காட்ட மற்றும் பாஸ்வேர்ட் மூலம் நீக்க
database.ref('wishes').on('value', (snapshot) => {
    const area = document.getElementById('wishesDisplay'); 
    area.innerHTML = "";
    const data = snapshot.val();
    if (data) {
        Object.keys(data).reverse().forEach(key => {
            const item = data[key];
            const div = document.createElement('div');
            div.className = 'wish-bubble';
            div.innerHTML = `<strong>${item.name}</strong><p>${item.wish}</p><button class="delete-btn" onclick="deleteWish('${key}')">✕ Delete</button>`;
            area.appendChild(div);
        });
    } else { area.innerHTML = "<p style='opacity:0.5; text-align:center;'>No wishes yet. Be the first to wish!</p>"; }
});

// அட்மின் பாஸ்வேர்ட் மூலம் மெசேஜை நீக்குதல் (Password: 1234)
function deleteWish(key) {
    const pwd = prompt("Enter Admin Password to delete this wish:");
    if (pwd === "1234") { 
        database.ref('wishes/' + key).remove()
        .then(() => alert("Wish deleted permanently!"))
        .catch((e) => alert("Error: " + e));
    } else if (pwd !== null) { 
        alert("Wrong Password! Access Denied."); 
    }
}
</script>

</body>
