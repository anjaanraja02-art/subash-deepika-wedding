<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subash ❤️ Deepika | Royal Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #D4AF37;
  --bg-color: #000; 
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif; background: var(--bg-color); color:#fff; scroll-behavior:smooth; overflow-x: hidden;}

/* --- HEADER FIX --- */
header{
    height: 100vh;
    width: 100%;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
}

.full-bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('photo1.jpg') center/cover no-repeat;
    z-index: 1;
}

header::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; width: 100%; height: 60%;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    z-index: 2;
}

/* மொபைலில் முகம் சரியாகத் தெரிய அட்ஜஸ்ட்மென்ட் */
@media (max-width: 768px) {
    .full-bg {
        background-position: 75% center; 
    }
}

.hero-content{
    z-index: 10;
    padding: 30px;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 20px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(212, 175, 55, 0.4);
    max-width: 85%;
    animation: fadeInUp 2s ease-out;
}

.trending-quote {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(22px, 5vw, 32px);
    color: var(--gold);
    margin-bottom: 5px;
}

.hero-content h1{
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 9vw, 60px);
    background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* --- SECTIONS --- */
section{padding:80px 20px; text-align:center;}
h2{font-family:'Playfair Display',serif; color:var(--gold); font-size:36px; margin-bottom:10px;}
.divider{width:60px; height:2px; background:var(--gold); margin:20px auto 30px;}

.glass-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 20px;
    padding: 35px;
    max-width: 650px;
    margin: 0 auto;
}

/* --- GALLERY GRID (அனைத்து போட்டோக்களும் இங்கே) --- */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    max-width: 1100px;
    margin: 0 auto;
}
.gallery img{
    width:100%; height:320px; object-fit:cover;
    border-radius:12px; cursor:pointer;
    transition: 0.5s ease;
    border: 1px solid rgba(212, 175, 55, 0.1);
}
.gallery img:hover{ transform: scale(1.03); border-color: var(--gold); }

/* --- UI ELEMENTS --- */
.music-btn {
    position: fixed; bottom: 25px; left: 20px; z-index: 1000;
    background: var(--gold); color: #000; border: none; padding: 12px 20px;
    border-radius: 30px; font-weight: bold; cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    display: flex; align-items: center; gap: 8px;
}

#lightbox{
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:9999;
}
#lightbox img{ max-width:90%; max-height:85%; border-radius: 10px; border: 2px solid var(--gold); }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

footer{ padding:40px; background: #000; color:var(--gold); text-align: center;}
</style>
</head>

<body>

<audio id="weddingMusic" loop>
  <source src="wedding-music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">
  <span id="musicIcon">🎵</span> <span id="btnText">Play Music</span>
</button>

<header>
  <div class="full-bg"></div>
  <div class="hero-content">
    <div class="trending-quote">"Two Hearts, One Soul... A Journey of Love Begins!"</div>
    <h1>Subash & Deepika</h1>
    <p style="font-size: 16px; letter-spacing: 2px; color: gold; margin-top: 5px; font-weight: bold;">MARCH 16 • 2026</p>
  </div>
</header>

<section>
  <div class="glass-card">
    <h2>Wedding Ceremony</h2>
    <div class="divider"></div>
    <p style="color: var(--gold); font-weight: 600; font-size: 20px;">Hindu Nadar Sanga Thirumana Mandapam</p>
    <p>Sivagalai – Tuticorin District</p>
    <br>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15764.516109462828!2d77.9304323!3d8.9664567!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b03f00000000001%3A0x6b4c100000000000!2sSivagalai!5e0!3m2!1sen!2sin!4v1700000000000" 
    width="100%" height="250" style="border-radius:15px; border:0; opacity: 0.8;" allowfullscreen="" loading="lazy"></iframe>
  </div>
</section>

<section id="gallery">
    <h2>Captured Moments</h2>
    <div class="divider"></div>
    <div class="gallery">
      <img src="photo1.jpg" onclick="openLightbox(this.src)">
      <img src="photo2.jpg" onclick="openLightbox(this.src)">
      <img src="photo3.jpg" onclick="openLightbox(this.src)">
      <img src="photo4.jpg" onclick="openLightbox(this.src)">
      <img src="photo5.jpg" onclick="openLightbox(this.src)">
      <img src="photo6.jpg" onclick="openLightbox(this.src)">
      <img src="photo7.jpg" onclick="openLightbox(this.src)">
      <img src="photo8.jpg" onclick="openLightbox(this.src)">
      <img src="photo9.jpg" onclick="openLightbox(this.src)">
      <img src="photo10.jpg" onclick="openLightbox(this.src)">
    </div>
</section>

<footer>
  WITH DIVINE BLESSINGS 🙏<br>
  <span style="font-size: 20px; margin-top: 10px; display: block; color: var(--gold);">SUBASH ❤️ DEEPIKA</span>
</footer>

<div id="lightbox" onclick="closeLightbox()"><img id="lightboxImg"></div>

<script>
function openLightbox(src){ document.getElementById("lightbox").style.display="flex"; document.getElementById("lightboxImg").src=src; }
function closeLightbox(){ document.getElementById("lightbox").style.display="none"; }

function toggleMusic() {
  var audio = document.getElementById('weddingMusic');
  var btnText = document.getElementById('btnText');
  var icon = document.getElementById('musicIcon');
  if (audio.paused) {
    audio.play();
    btnText.innerHTML = 'Stop Music';
    icon.innerHTML = '⏸';
  } else {
    audio.pause();
    btnText.innerHTML = 'Play Music';
    icon.innerHTML = '🎵';
  }
}
</script>

</body>
</html>
