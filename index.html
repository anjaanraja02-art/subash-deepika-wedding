<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subash ❤️ Deepika | Wedding Invitation</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root { --gold: #D4AF37; --bg: #1a0202; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif; background: var(--bg); color:#fff; scroll-behavior:smooth; overflow-x: hidden;}

/* --- HEADER FIX --- */
header{
    height: 100vh; width: 100%; position: relative;
    display: flex; flex-direction: column; justify-content: space-between; 
    align-items: center; padding: 10vh 0 10vh 0; text-align: center;
}
.main-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: url('photo2.jpg') center/cover no-repeat; z-index: 1;
}
header::after {
    content: ""; position: absolute; top:0; left:0; width: 100%; height: 100%;
    background: linear-gradient(to bottom, rgba(26,2,2,0.6) 0%, rgba(26,2,2,0) 40%, rgba(26,2,2,0) 70%, rgba(26,2,2,0.95) 100%);
    z-index: 2;
}

.hero-content { z-index: 10; position: relative; }
.hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(34px, 10vw, 65px); color: var(--gold); text-shadow: 2px 2px 15px rgba(0,0,0,0.9); }

/* --- COUNTDOWN NEAR LEGS (BOTTOM AREA) --- */
.countdown-container { 
    z-index: 10; position: relative; 
    margin-bottom: 5vh; /* Ponnu maplai leg pakkathil varuvatharku */
}
.countdown-wrap { display: flex; gap: 10px; justify-content: center; }
.count-box { 
    background: rgba(0, 0, 0, 0.6); 
    backdrop-filter: blur(8px); 
    border: 1px solid var(--gold); 
    padding: 10px; border-radius: 12px; min-width: 65px; 
}
.count-box span { display: block; font-size: 22px; font-weight: bold; color: var(--gold); }
.count-box label { font-size: 9px; text-transform: uppercase; color: #eee; }

/* GALLERY SECTION */
.gallery-section { padding: 40px 15px; background: #000; }
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1100px; margin: 0 auto; }
.gallery-grid img { width: 100%; height: 350px; object-fit: cover; border-radius: 15px; border: 1px solid rgba(212,175,55,0.2); }

section { padding: 50px 20px; text-align: center; }
.luxury-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 25px; padding: 40px 20px; max-width: 750px; margin: 0 auto; }
.btn-gold { width: 100%; background: linear-gradient(45deg, #BF953F, #FCF6BA); color: #000; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; }
.music-btn { position: fixed; bottom: 25px; left: 20px; z-index: 1000; background: var(--gold); color: #000; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; }
</style>
</head>

<body onclick="playMusicOnFirstClick()">

<audio id="weddingMusic" loop><source src="wedding-music.mp3" type="audio/mpeg"></audio>
<button class="music-btn" id="musicBtn" onclick="event.stopPropagation(); toggleMusic();">🎵 Music</button>

<header>
  <div class="main-bg"></div>
  <div class="hero-content">
    <p style="font-family: 'Great Vibes', cursive; font-size: 28px; color: var(--gold);">Save The Date</p>
    <h1>Subash & Deepika</h1>
    <p style="letter-spacing: 3px; font-weight: bold; color: #fff;">16.03.2026</p>
  </div>

  <div class="countdown-container">
    <p style="margin-bottom: 8px; font-size: 12px; letter-spacing: 2px; text-shadow: 1px 1px 5px #000;">THE BIG DAY IN...</p>
    <div class="countdown-wrap">
      <div class="count-box"><span id="days">00</span><label>Days</label></div>
      <div class="count-box"><span id="hours">00</span><label>Hours</label></div>
      <div class="count-box"><span id="mins">00</span><label>Mins</label></div>
      <div class="count-box"><span id="secs">00</span><label>Secs</label></div>
    </div>
  </div>
</header>

<div class="gallery-section">
    <div class="gallery-grid">
      <img src="photo1.jpg">
      <img src="photo2.jpg">
      <img src="photo3.jpg">
      <img src="photo4.jpg">
      <img src="photo5.jpg">
      <img src="photo6.jpg">
      <img src="photo7.jpg">
      <img src="photo8.jpg">
      <img src="photo9.jpg">
      <img src="photo10.jpg">
    </div>
</div>

<section>
  <div class="luxury-card">
    <h2 style="color: var(--gold); margin-bottom: 20px;">Venue</h2>
    <p style="font-size: 18px; font-weight: 600;">Hindu Nadar Sanga Thirumana Mandapam</p>
    <p style="margin-bottom: 20px; opacity: 0.8;">Sivagalai, Tuticorin.</p>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3945.31304561726!2d77.9472643!3d8.5658603!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b03f0ecf69666c3%3A0x6d2c4b8b603845b4!2sHindu%20Nadar%20Sangam%20Marriage%20Hall!5e0!3m2!1sen!2sin!4v1700000000000" width="100%" height="250" style="border-radius:15px; border:1px solid gold;"></iframe>
  </div>
</section>

<section>
  <div class="luxury-card">
    <h2 style="color: var(--gold); margin-bottom: 20px;">Wishes</h2>
    <input type="text" id="nameInput" placeholder="Name">
    <textarea id="wishInput" placeholder="Wishes..." rows="3"></textarea>
    <button class="btn-gold" onclick="saveWish()">Bless Us</button>
    <div id="wishesDisplay" style="text-align: left; margin-top: 20px;"></div>
  </div>
</section>

<script>
const firebaseConfig = { databaseURL: "https://subashdeepikawedding-ebbd3-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// Real-time Countdown
const weddingDate = new Date("March 16, 2026 09:00:00").getTime();
setInterval(() => {
    const now = new Date().getTime();
    const diff = weddingDate - now;
    document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000);
}, 1000);

function saveWish() {
    const name = document.getElementById('nameInput').value;
    const wish = document.getElementById('wishInput').value;
    if (name && wish) {
        database.ref('wishes').push().set({ name, wish }).then(() => {
            window.open(`https://wa.me/919629377101?text=${encodeURIComponent(name + ": " + wish)}`);
            document.getElementById('nameInput').value = ""; document.getElementById('wishInput').value = "";
        });
    }
}
database.ref('wishes').on('value', (snap) => {
    const area = document.getElementById('wishesDisplay'); area.innerHTML = "";
    const data = snap.val();
    if (data) Object.keys(data).reverse().forEach(k => {
        area.innerHTML += `<div style="background:rgba(212,175,55,0.1); padding:10px; border-radius:8px; margin-bottom:10px; border-left:3px solid gold;"><strong>${data[k].name}</strong><p>${data[k].wish}</p></div>`;
    });
});

var audio = document.getElementById('weddingMusic');
function playMusicOnFirstClick() { audio.play(); }
function toggleMusic() { audio.paused ? audio.play() : audio.pause(); }
</script>
</body>
</html>
