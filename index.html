<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subash ❤️ Deepika | Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #D4AF37;
  --premium-dark: #0a0a0a; 
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif; background: var(--premium-dark); color:#fff; scroll-behavior:smooth; overflow-x: hidden;}

/* --- LUXURY HEADER: FACE CUT FIXED --- */
header{
    height: 100vh;
    width: 100%;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-start; 
    padding-top: 5vh; /* எழுத்துக்கள் மேலே நகர்த்தப்பட்டுள்ளது */
    text-align: center;
}

.main-bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('photo2.jpg') center/cover no-repeat;
    z-index: 1;
}

header::after {
    content: "";
    position: absolute;
    top:0; left:0; width: 100%; height: 100%;
    background: linear-gradient(to bottom, rgba(10,10,10,0.5) 0%, rgba(10,10,10,0.2) 40%, rgba(10,10,10,0.95) 100%);
    z-index: 2;
}

@media (max-width: 768px) {
    .main-bg { background-position: center 10%; } /* */
}

.hero-content{
    z-index: 10;
    padding: 20px;
    max-width: 90%;
    animation: fadeIn 2s ease-in-out;
}

.trending-quote {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(26px, 6vw, 40px);
    color: var(--gold);
    text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
}

.hero-content h1{
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 10vw, 70px);
    background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
}

/* --- SECTIONS & CARDS --- */
section{padding:80px 20px; text-align:center;}
h2{font-family:'Playfair Display',serif; color:var(--gold); font-size:38px; letter-spacing: 2px;}
.divider{width:60px; height:2px; background:var(--gold); margin:15px auto 35px;}

.luxury-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 25px;
    padding: 40px 25px;
    max-width: 750px;
    margin: 0 auto 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* WISHES DISPLAY AREA */
.wishes-display {
    margin-top: 30px;
    text-align: left;
    max-height: 350px;
    overflow-y: auto;
    padding: 10px;
    border-top: 1px solid rgba(212, 175, 55, 0.2);
}
.wish-item {
    background: rgba(212, 175, 55, 0.1);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 12px;
    border-left: 4px solid var(--gold);
    animation: slideIn 0.5s ease-out;
}
.wish-item strong { color: var(--gold); display: block; margin-bottom: 5px; font-size: 14px; }
.wish-item p { font-size: 15px; opacity: 0.9; line-height: 1.4; }

/* INPUTS & BUTTONS */
input, textarea {
    width: 100%; padding: 15px; margin-bottom: 15px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 12px; color: #fff; outline: none; font-size: 14px;
}

.btn-gold {
    width: 100%; background: linear-gradient(45deg, #BF953F, #FCF6BA);
    color: #000; padding: 15px; border-radius: 12px; font-weight: bold; 
    cursor: pointer; border: none; font-size: 16px; transition: 0.3s;
}

.music-btn {
    position: fixed; bottom: 25px; left: 20px; z-index: 1000;
    background: var(--gold); color: #000; 
    border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold;
}

footer{ padding:60px; background: #050505; color:var(--gold); text-align: center;}

@keyframes fadeIn { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>

<body onclick="playMusicOnFirstClick()">

<audio id="weddingMusic" loop>
  <source src="wedding-music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" id="musicBtn" onclick="event.stopPropagation(); toggleMusic();">
  <span id="musicIcon">🎵</span> <span id="btnText">Play Music</span>
</button>

<header>
  <div class="main-bg"></div>
  <div class="hero-content">
    <div class="trending-quote">Two Hearts, One Soul...</div>
    <h1>Subash & Deepika</h1>
    <p style="color: gold; font-weight: bold; letter-spacing: 3px; border-top: 1px solid gold; border-bottom: 1px solid gold; display: inline-block; padding: 5px 15px; margin-top: 10px;">MARCH 16 • 2026</p>
  </div>
</header>

<section id="gallery">
    <h2>Captured Moments</h2>
    <div class="divider"></div>
    <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:15px;">
      <img src="photo1.jpg" style="width:100%; height:320px; object-fit:cover; border-radius:15px;">
      <img src="photo2.jpg" style="width:100%; height:320px; object-fit:cover; border-radius:15px;">
      <img src="photo3.jpg" style="width:100%; height:320px; object-fit:cover; border-radius:15px;">
    </div>
</section>

<section>
  <div class="luxury-card">
    <h2>Bless the Couple</h2>
    <div class="divider"></div>
    <input type="text" id="senderName" placeholder="Your Name">
    <textarea id="senderWish" placeholder="Write your warm wishes here..." rows="4"></textarea>
    <button class="btn-gold" onclick="sendAndDisplayWish()">Send Wishes & WhatsApp</button>

    <div id="wishesDisplayArea" class="wishes-display">
       <p id="noWishText" style="text-align: center; opacity: 0.5;">No wishes yet. Be the first to wish!</p>
    </div>
  </div>
</section>

<footer>
  <span style="font-size: 32px; color: var(--gold); font-family: 'Great Vibes', cursive;">Subash ❤️ Deepika</span>
</footer>

<script>
var audio = document.getElementById('weddingMusic');
var hasPlayed = false;

function playMusicOnFirstClick() {
  if (!hasPlayed) {
    audio.play().then(() => {
        document.getElementById('btnText').innerHTML = 'Stop Music';
        document.getElementById('musicIcon').innerHTML = '⏸';
        hasPlayed = true;
    }).catch(e => console.log("Click to play"));
  }
}

function toggleMusic() {
  if (audio.paused) {
    audio.play();
    document.getElementById('btnText').innerHTML = 'Stop Music';
    document.getElementById('musicIcon').innerHTML = '⏸';
  } else {
    audio.pause();
    document.getElementById('btnText').innerHTML = 'Play Music';
    document.getElementById('musicIcon').innerHTML = '🎵';
  }
  hasPlayed = true;
}

function sendAndDisplayWish() {
    var name = document.getElementById('senderName').value;
    var wish = document.getElementById('senderWish').value;
    var myNumber = "919629377101"; // உங்கள் புதிய எண் இங்கே மாற்றப்பட்டுள்ளது

    if (name === "" || wish === "") {
        alert("Please enter both Name and Wish!");
        return;
    }

    // 1. WhatsApp-க்கு மெசேஜ் அனுப்புதல்
    var message = "Wedding Wish from " + name + ": " + wish;
    window.open("https://wa.me/" + myNumber + "?text=" + encodeURIComponent(message));

    // 2. வெப்சைட்டில் வாழ்த்தைக் காட்டுதல்
    var displayArea = document.getElementById('wishesDisplayArea');
    var noWishText = document.getElementById('noWishText');
    
    if (noWishText) { noWishText.remove(); }

    var newWish = document.createElement('div');
    newWish.className = 'wish-item';
    newWish.innerHTML = '<strong>' + name + '</strong><p>' + wish + '</p>';
    
    displayArea.insertBefore(newWish, displayArea.firstChild);

    // இன்புட் பாக்ஸ்களை காலியாக்குதல்
    document.getElementById('senderName').value = "";
    document.getElementById('senderWish').value = "";
}
</script>

</body>
</html>
