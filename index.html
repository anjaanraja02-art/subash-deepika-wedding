<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subash ❤️ Deepika | Royal Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #D4AF37;
  --dark-maroon: #2b0303; 
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif; background: var(--dark-maroon); color:#fff; scroll-behavior:smooth; overflow-x: hidden;}

/* --- HEADER: மணமக்கள் இருவரும் முழுமையாகத் தெரிய முக்கிய மாற்றம் --- */
header{
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('photo1.jpg') no-repeat;
    
    /* 'contain' பயன்படுத்தினால் போட்டோ வெட்டப்படாமல் முழுமையாகத் தெரியும் */
    background-size: contain; 
    background-position: center bottom;
    background-color: #1a0202; /* போட்டோவுக்கு பின்னால் இருக்கும் நிறம் */
    
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
}

/* மொபைல் வியூவில் மட்டும் போட்டோ அளவு அட்ஜஸ்ட்மென்ட் */
@media (max-width: 768px) {
    header {
        background-size: cover; /* மொபைலில் திரையை நிரப்ப */
        background-position: center 10%; /* இருவர் முகமும் தெரிய மையப்படுத்துதல் */
    }
}

.hero-content{
    z-index:2;
    padding: 20px;
    background: rgba(0,0,0,0.5);
    border-radius: 15px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(212, 175, 55, 0.3);
    max-width: 90%;
}

.trending-quote {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(20px, 5vw, 28px);
    color: var(--gold);
    margin-bottom: 5px;
}

.hero-content h1{
    font-family: 'Playfair Display', serif;
    font-size: clamp(30px, 8vw, 55px);
    background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* --- Content Sections --- */
section{padding:60px 20px; text-align:center;}
h2{font-family:'Playfair Display',serif; color:var(--gold); font-size:32px; margin-bottom:10px;}
.divider{width:50px; height:2px; background:var(--gold); margin:15px auto 25px;}

.glass-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 20px;
    padding: 25px;
    max-width: 600px;
    margin: 0 auto;
}

.music-btn {
    position: fixed; bottom: 20px; left: 20px; z-index: 1000;
    background: var(--gold); color: #000; border: none; padding: 10px 18px;
    border-radius: 30px; font-weight: bold; cursor: pointer;
    display: flex; align-items: center; gap: 8px; font-size: 13px;
}

footer{ padding:30px; background: #1a0202; color:var(--gold); text-align: center; font-size: 14px;}
</style>
</head>

<body>

<audio id="weddingMusic" loop>
  <source src="wedding-music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">
  <span id="musicIcon">🎵</span> <span id="btnText">Play Music</span>
</button>

<header>
<div class="hero-content">
  <div class="trending-quote">"Two Hearts, One Soul... A Journey of Love Begins!"</div>
  <h1>Subash & Deepika</h1>
  <p style="font-size: 16px; color: gold; margin-top: 5px;">MARCH 16 • 2026</p>
</div>
</header>

<section>
  <div class="glass-card">
    <h2>The Wedding</h2>
    <div class="divider"></div>
    <p>We request the honor of your presence at the marriage of our children.</p>
    <p style="color: var(--gold); font-weight: 600; font-size: 18px; margin-top: 10px;">Hindu Nadar Sanga Thirumana Mandapam</p>
    <p>Sivagalai – Tuticorin District</p>
    <br>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3945.874136611382!2d77.942702!3d8.627255!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zOMKwMzcnMzguMSJOIDc3wrA1NiczMy43IkU!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin" 
    width="100%" height="250" style="border-radius:15px; border:0; opacity: 0.8;" allowfullscreen="" loading="lazy"></iframe>
  </div>
</section>

<footer>
  WITH DIVINE BLESSINGS 🙏<br>
  <span style="font-size: 18px; margin-top: 10px; display: block; color: var(--gold);">SUBASH ❤️ DEEPIKA</span>
</footer>

<script>
function toggleMusic() {
  var audio = document.getElementById('weddingMusic');
  var btnText = document.getElementById('btnText');
  var icon = document.getElementById('musicIcon');
  if (audio.paused) {
    audio.play();
    btnText.innerHTML = 'Stop Music';
    icon.innerHTML = '⏸';
  } else {
    audio.pause();
    btnText.innerHTML = 'Play Music';
    icon.innerHTML = '🎵';
  }
}
</script>

</body>
</html>
