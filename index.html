<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subash ❤️ Deepika | Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #D4AF37;
  --premium-dark: #0f0f0f; /* Luxury Charcoal Black */
  --accent: #1a1a1a;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif; background: var(--premium-dark); color:#fff; scroll-behavior:smooth; overflow-x: hidden;}

/* --- LUXURY HEADER --- */
header{
    height: 100vh;
    width: 100%;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: flex-start; 
    padding-top: 5vh; /* எழுத்துக்கள் மேலே நகர்த்தப்பட்டுள்ளது */
    text-align: center;
}

.main-bg {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('photo2.jpg') center/cover no-repeat;
    z-index: 1;
}

header::after {
    content: "";
    position: absolute;
    top:0; left:0; width: 100%; height: 100%;
    /* Gradient for Face Clarity */
    background: linear-gradient(to bottom, rgba(15,15,15,0.5) 0%, rgba(15,15,15,0.1) 40%, rgba(15,15,15,0.95) 100%);
    z-index: 2;
}

@media (max-width: 768px) {
    .main-bg { background-position: center 10%; } /* */
}

.hero-content{
    z-index: 10;
    padding: 20px;
    max-width: 90%;
    animation: fadeIn 2.5s ease-in-out;
}

.trending-quote {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(26px, 6vw, 40px);
    color: var(--gold);
    margin-bottom: 5px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
}

.hero-content h1{
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 10vw, 70px);
    background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
}

.wedding-date {
    font-size: 16px;
    color: gold;
    font-weight: bold;
    letter-spacing: 4px;
    border-top: 1px solid rgba(212, 175, 55, 0.5);
    border-bottom: 1px solid rgba(212, 175, 55, 0.5);
    display: inline-block;
    padding: 8px 20px;
    margin-top: 10px;
}

/* --- PREMIUM SECTIONS --- */
section{padding:100px 20px; text-align:center;}
h2{font-family:'Playfair Display',serif; color:var(--gold); font-size:42px; letter-spacing: 2px;}
.divider{width:80px; height:2px; background:var(--gold); margin:20px auto 40px;}

.luxury-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 30px;
    padding: 50px 30px;
    max-width: 800px;
    margin: 0 auto 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* --- GALLERY --- */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}
.gallery img{
    width:100%; height:380px; object-fit:cover;
    border-radius:20px; border: 1px solid rgba(212, 175, 55, 0.1);
    transition: 0.6s ease;
}
.gallery img:hover{ transform: scale(1.03); border-color: var(--gold); }

/* --- UI ELEMENTS --- */
.music-btn {
    position: fixed; bottom: 30px; left: 30px; z-index: 1000;
    background: var(--gold); color: #000; 
    border: none; padding: 12px 25px; border-radius: 50px; 
    font-weight: bold; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.btn-premium {
    width: 100%; background: linear-gradient(45deg, #BF953F, #FCF6BA);
    color: #000; padding: 15px; border-radius: 12px; font-weight: bold; 
    cursor: pointer; border: none; font-size: 16px; margin-top: 10px;
}

input, textarea {
    width: 100%; padding: 15px; margin-bottom: 20px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 12px; color: #fff; outline: none;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-40px); }
    to { opacity: 1; transform: translateY(0); }
}

footer{ padding:80px; background: #050505; color:var(--gold); text-align: center; border-top: 1px solid #1a1a1a;}
</style>
</head>

<body onclick="playMusicOnFirstClick()">

<audio id="weddingMusic" loop>
  <source src="wedding-music.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" id="musicBtn" onclick="event.stopPropagation(); toggleMusic();">
  <span id="musicIcon">🎵</span> <span id="btnText">Play Music</span>
</button>

<header>
  <div class="main-bg"></div>
  <div class="hero-content">
    <div class="trending-quote">A Match Made in Heaven...</div>
    <h1>Subash & Deepika</h1>
    <div class="wedding-date">MARCH 16 • 2026</div>
  </div>
</header>

<section>
  <div class="luxury-card">
    <h2>The Ceremony</h2>
    <div class="divider"></div>
    <p style="font-size: 20px; color: #ccc; margin-bottom: 20px;">We request the honor of your presence.</p>
    <p style="color: var(--gold); font-weight: 600; font-size: 26px;">Hindu Nadar Sanga Thirumana Mandapam</p>
    <p style="font-size: 18px;">Sivagalai – Tuticorin District</p>
    <br>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15764.444256627047!2d77.9427181!3d8.9665518!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b03eb2df551403b%3A0xc6c78a05c754b7c1!2sSivagalai%2C%20Tamil%20Nadu!5e0!3m2!1sen!2sin!4v1709400000000!5m2!1sen!2sin5" width="100%" height="300" style="border-radius:20px; border:0; filter: invert(90%) hue-rotate(180deg);"></iframe>
  </div>
</section>

<section id="gallery">
    <h2>Captured Moments</h2>
    <div class="divider"></div>
    <div class="gallery">
      <img src="photo1.jpg"><img src="photo2.jpg"><img src="photo3.jpg">
      <img src="photo4.jpg"><img src="photo5.jpg"><img src="photo6.jpg">
      <img src="photo7.jpg"><img src="photo8.jpg"><img src="photo9.jpg"><img src="photo10.jpg">
    </div>
</section>

<section>
  <div class="luxury-card">
    <h2>Blessings & Wishes</h2>
    <div class="divider"></div>
    <input type="text" placeholder="Your Name">
    <textarea placeholder="Your Warm Wishes" rows="4"></textarea>
    <button class="btn-premium">Send Wishes</button>
    
    <button class="btn-premium" style="background: #25D366; color: #fff;" onclick="shareOnWhatsApp()">
      Share via WhatsApp
    </button>
  </div>
</section>

<footer>
  <p style="font-size: 16px; opacity: 0.7; letter-spacing: 3px; margin-bottom: 15px;">WITH DIVINE BLESSINGS</p>
  <span style="font-size: 38px; color: var(--gold); font-family: 'Great Vibes', cursive;">Subash ❤️ Deepika</span>
</footer>

<script>
var audio = document.getElementById('weddingMusic');
var hasPlayed = false;

function playMusicOnFirstClick() {
  if (!hasPlayed) {
    audio.play().then(() => {
        document.getElementById('btnText').innerHTML = 'Stop Music';
        document.getElementById('musicIcon').innerHTML = '⏸';
        hasPlayed = true;
    }).catch(e => console.log("Click to play music"));
  }
}

function toggleMusic() {
  if (audio.paused) {
    audio.play();
    document.getElementById('btnText').innerHTML = 'Stop Music';
    document.getElementById('musicIcon').innerHTML = '⏸';
  } else {
    audio.pause();
    document.getElementById('btnText').innerHTML = 'Play Music';
    document.getElementById('musicIcon').innerHTML = '🎵';
  }
  hasPlayed = true;
}

function shareOnWhatsApp() {
    var text = "You are cordially invited to the wedding of Subash ❤️ Deepika 💍\nCheck out the invitation here: " + window.location.href;
    window.open("https://wa.me/?text=" + encodeURIComponent(text));
}
</script>

</body>
</html>
